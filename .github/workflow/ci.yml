name: CI Pipeline
on:
  push:
    branches: [main]      
  pull_request:
    branches: [main]
workflow_dispatch:

jopbs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'

      - name: Install dependencies
        run: npm ci 

      - name: Run tests
        run: npm test


        